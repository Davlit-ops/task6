---
- name: Download Jenkins repo key
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: add jenkins apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    filename: jenkins
    state: present

- name: Install jenkins
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Create Jenkins init.groovy.d directory
  ansible.builtin.file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Get admin password from secrets manager
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value --secret-id "task6-jenkins" --query SecretString --output text --region us-east-2
  register: secretsmanager_output
  changed_when: false

- name: Configure basic security via Groovy template
  ansible.builtin.template:
    src: security.groovy.j2
    dest: /var/lib/jenkins/init.groovy.d/security.groovy
    owner: jenkins
    group: jenkins
    mode: '0644'
  notify: Restart Jenkins
